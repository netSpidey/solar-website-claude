name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Explicitly grant permissions required to push to the gh-pages branch
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .output/public
          publish_branch: gh-pages
        # If you still get a 403 (write access) after adding permissions,
        # create a Personal Access Token (repo scope) and add it as
        # a repository secret named GH_PAGES_PAT, then replace
        # 'github_token' above with:
        #   personal_token: ${{ secrets.GH_PAGES_PAT }}
